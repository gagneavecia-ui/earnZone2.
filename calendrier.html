<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone - Calendrier des gains</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    /* ===== VARIABLES GLOBALES ===== */
    :root {
      --primary: #00ffcc;
      --primary-dark: #00cca3;
      --secondary: #ff4d94;
      --accent: #9d4edd;
      --bg-dark: #000000;
      --bg-medium: #0a0a0a;
      --bg-light: #1a1a1a;
      --text-light: #ffffff;
      --text-dim: #94a3b8;
      --card-bg: rgba(20, 20, 20, 0.8);
      --card-border: rgba(255, 255, 255, 0.05);
      --success: #4cff4c;
      --warning: #ffcc00;
      --danger: #ff4757;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
      
      /* Couleurs des jours */
      --monday: #00ffcc;
      --tuesday: #ff4d94;
      --wednesday: #9d4edd;
      --thursday: #ffcc00;
      --friday: #4cff4c;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000000;
      color: var(--text-light);
      padding-bottom: 100px;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, rgba(0, 255, 204, 0.05) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(157, 78, 221, 0.05) 0%, transparent 40%);
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 5%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
    }

    .back-btn:hover {
      color: var(--primary);
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 600;
    }

    .page-title i {
      color: var(--primary);
    }

    .balance-display {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 255, 204, 0.05);
      border: 1px solid rgba(0, 255, 204, 0.1);
      border-radius: 30px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
    }

    /* ===== CONTENEUR ===== */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ===== CARTE INFO ===== */
    .info-card {
      background: linear-gradient(135deg, rgba(0, 255, 204, 0.1), rgba(157, 78, 221, 0.1));
      border-radius: 24px;
      padding: 25px;
      margin-bottom: 25px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .info-card h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .info-card h1 span {
      color: var(--primary);
    }

    .info-card p {
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .progress-container {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 50px;
      padding: 15px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .progress-bar {
      height: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      width: 0%;
      transition: width 0.5s;
    }

    .week-earnings {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
      margin-top: 10px;
    }

    /* =awan ===== GRILLE DES JOURS ===== */
    .days-grid {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 25px;
    }

    .day-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
    }

    .day-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
    }

    .day-card.monday::before { background: var(--monday); }
    .day-card.tuesday::before { background: var(--tuesday); }
    .day-card.wednesday::before { background: var(--wednesday); }
    .day-card.thursday::before { background: var(--thursday); }
    .day-card.friday::before { background: var(--friday); }

    .day-card.today {
      border-color: var(--primary);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.2);
    }

    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }

    .day-name {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .day-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .monday .day-icon { background: rgba(0, 255, 204, 0.2); color: var(--monday); }
    .tuesday .day-icon { background: rgba(255, 77, 148, 0.2); color: var(--tuesday); }
    .wednesday .day-icon { background: rgba(157, 78, 221, 0.2); color: var(--wednesday); }
    .thursday .day-icon { background: rgba(255, 204, 0, 0.2); color: var(--thursday); }
    .friday .day-icon { background: rgba(76, 255, 76, 0.2); color: var(--friday); }

    .day-title {
      font-size: 18px;
      font-weight: 700;
    }

    .day-status {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }

    .status-available {
      background: rgba(76, 255, 76, 0.1);
      border: 1px solid rgba(76, 255, 76, 0.2);
      color: var(--success);
    }

    .status-completed {
      background: rgba(255, 204, 0, 0.1);
      border: 1px solid rgba(255, 204, 0, 0.2);
      color: var(--warning);
    }

    .status-locked {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-dim);
    }

    .day-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .day-activity {
      flex: 1;
    }

    .activity-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .activity-desc {
      font-size: 12px;
      color: var(--text-dim);
    }

    .day-reward {
      text-align: right;
    }

    .reward-amount {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
    }

    .reward-label {
      font-size: 10px;
      color: var(--text-dim);
    }

    .day-action {
      margin-top: 15px;
    }

    .action-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .action-btn.available {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: black;
    }

    .action-btn.available:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 255, 204, 0.3);
    }

    .action-btn.completed {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-dim);
      cursor: not-allowed;
    }

    .action-btn.locked {
      background: rgba(255, 255, 255, 0.02);
      color: var(--text-dim);
      cursor: not-allowed;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* =awan ===== ACTIVITÉ DU JOUR ===== */
    .activity-section {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 25px;
      margin-bottom: 25px;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--primary);
    }

    .activity-container {
      text-align: center;
    }

    .activity-icon {
      font-size: 48px;
      color: var(--primary);
      margin-bottom: 15px;
    }

    .activity-instruction {
      color: var(--text-dim);
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .video-link {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
    }

    .video-link input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-light);
      font-size: 13px;
      padding: 5px;
    }

    .video-link input:focus {
      outline: none;
    }

    .copy-btn {
      background: rgba(0, 255, 204, 0.1);
      border: 1px solid rgba(0, 255, 204, 0.2);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--primary);
      cursor: pointer;
    }

    /* ===== BOUTON RETOUR ===== */
    .back-home {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: black;
      padding: 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0, 255, 204, 0.3);
      z-index: 99;
      max-width: 500px;
      margin: 0 auto;
    }

    /* ===== NOTIFICATION ===== */
    .notification {
      position: fixed;
      bottom: 80px;
      left: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid var(--primary);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 1000;
      transform: translateY(200px);
      transition: transform 0.5s;
      max-width: 400px;
      margin: 0 auto;
    }

    .notification.show {
      transform: translateY(0);
    }

    .notification-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
    }
  </style>
</head>
<body>

  <div class="gradient-bg"></div>

  <div class="notification" id="notification">
    <div class="notification-icon">
      <i class="fas fa-gift"></i>
    </div>
    <div class="notification-content">
      <h4 id="notificationTitle">Calendrier</h4>
      <p id="notificationMessage">Bienvenue</p>
    </div>
  </div>

  <header class="header">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Retour
    </a>
    <div class="page-title">
      <i class="fas fa-calendar-alt"></i> Calendrier
    </div>
    <div class="balance-display">
      <i class="fas fa-coins"></i>
      <span id="currentBalance">0 FCFA</span>
    </div>
  </header>

  <div class="container">
    
    <!-- Carte info -->
    <div class="info-card">
      <h1>Calendrier <span>des gains</span></h1>
      <p>Gagnez jusqu'à <strong>2000 FCFA</strong> par semaine en complétant les activités quotidiennes</p>
      
    
    </div>

    <!-- Grille des jours -->
    <div class="days-grid" id="daysGrid"></div>

    <!-- Activité du jour (affichée quand on clique) -->
    <div class="activity-section" id="activitySection" style="display: none;">
      <h3 class="section-title" id="activityDayTitle">
        <i class="fas fa-calendar-day"></i>
        <span id="activityDayName">Lundi</span>
      </h3>
      
      <div class="activity-container" id="activityContent">
        <!-- Le contenu change selon le jour -->
      </div>
    </div>

  </div>

  <a href="index.html" class="back-home">
    <i class="fas fa-home"></i> Retour à l'accueil
  </a>

  <script>
    // ============================================
    // DONNÉES
    // ============================================
    let userData = null;
    let userId = null;
    const MAX_WEEK_EARNINGS = 2000;
    const DAILY_MAX = 400;

    const days = [
      { 
        name: 'Lundi', 
        icon: 'fa-gamepad', 
        activity: 'Jeu unique',
        description: 'Jouez à notre jeu du jour et gagnez jusqu\'à 400 FCFA',
        action: 'JOUER MAINTENANT',
        link: 'b.html'
      },
      { 
        name: 'Mardi', 
        icon: 'fa-question-circle', 
        activity: 'Quiz',
        description: 'Répondez aux questions et testez vos connaissances',
        action: 'COMMENCER LE QUIZ',
        link: 'q.html'
      },
      { 
        name: 'Mercredi', 
        icon: 'fa-video', 
        activity: 'Vidéos',
        description: 'Regardez des vidéos et gagnez des points',
        action: 'VOIR LES VIDÉOS',
        link: 'v.html'
      },
      { 
        name: 'Jeudi', 
        icon: 'fa-circle-notch', 
        activity: 'Roue de la chance',
        description: 'Tentez votre chance et gagnez jusqu\'à 400 FCFA',
        action: 'TOURNER LA ROUE',
        link: 'r.html'
      },
      { 
        name: 'Vendredi', 
        icon: 'fa-star', 
        activity: 'Activité au choix',
        description: 'Choisissez votre activité préférée de la semaine',
        action: 'CHOISIR',
        link: 'c.html'
      }
    ];

    // ============================================
    // INITIALISATION
    // ============================================
    function init() {
      loadUserData();
      renderCalendar();
      updateWeekProgress();
    }

    // ============================================
    // CHARGER DONNÉES
    // ============================================
    function loadUserData() {
      userId = localStorage.getItem('earnzone_current_user');
      if (!userId) {
        window.location.href = 'login.html';
        return;
      }

      const userStr = localStorage.getItem(`earnzone_user_${userId}`);
      if (userStr) {
        userData = JSON.parse(userStr);
        document.getElementById('currentBalance').textContent = 
          (userData.balance || 0).toLocaleString('fr-FR') + ' FCFA';
      }
    }

    // ============================================
    // AFFICHER LE CALENDRIER
    // ============================================
    function renderCalendar() {
      const today = new Date().getDay(); // 0 = Dimanche, 1 = Lundi, etc.
      const weekData = getWeekData();
      
      let html = '';
      
      days.forEach((day, index) => {
        const dayIndex = index + 1; // Lundi = 1
        const isToday = today === dayIndex;
        const status = getDayStatus(dayIndex, weekData);
        
        let statusClass = '';
        let statusText = '';
        let buttonClass = '';
        let buttonDisabled = true;
        let buttonText = '';
        
        if (status === 'available') {
          statusClass = 'status-available';
          statusText = 'Disponible';
          buttonClass = 'available';
          buttonDisabled = false;
          buttonText = day.action;
        } else if (status === 'completed') {
          statusClass = 'status-completed';
          statusText = 'Terminé';
          buttonClass = 'completed';
          buttonDisabled = true;
          buttonText = 'DÉJÀ FAIT';
        } else {
          statusClass = 'status-locked';
          statusText = 'Verrouillé';
          buttonClass = 'locked';
          buttonDisabled = true;
          buttonText = 'NON DISPONIBLE';
        }
        
        html += `
          <div class="day-card ${day.name.toLowerCase()} ${isToday ? 'today' : ''}">
            <div class="day-header">
              <div class="day-name">
                <div class="day-icon">
                  <i class="fas ${day.icon}"></i>
                </div>
                <span class="day-title">${day.name}</span>
              </div>
              <span class="day-status ${statusClass}">${statusText}</span>
            </div>
            
            <div class="day-content">
              <div class="day-activity">
                <div class="activity-name">${day.activity}</div>
                <div class="activity-desc">${day.description}</div>
              </div>
              <div class="day-reward">
                <div class="reward-amount">400</div>
                <div class="reward-label">FCFA</div>
              </div>
            </div>
            
            <div class="day-action">
              <button class="action-btn ${buttonClass}" 
                      onclick="startActivity(${dayIndex})"
                      ${buttonDisabled ? 'disabled' : ''}>
                ${buttonText}
              </button>
            </div>
          </div>
        `;
      });
      
      document.getElementById('daysGrid').innerHTML = html;
    }

    // ============================================
    // OBTENIR LES DONNÉES DE LA SEMAINE
    // ============================================
    function getWeekData() {
      const weekKey = getWeekKey();
      const weekData = JSON.parse(localStorage.getItem(`week_${weekKey}_${userId}`)) || {
        completed: [],
        earnings: 0
      };
      return weekData;
    }

    // ============================================
    // OBTENIR LA CLÉ DE LA SEMAINE
    // ============================================
    function getWeekKey() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 1);
      const days = Math.floor((now - start) / (24 * 60 * 60 * 1000));
      return Math.ceil(days / 7);
    }

    // ============================================
    // STATUT D'UN JOUR
    // ============================================
    function getDayStatus(dayIndex, weekData) {
      const today = new Date().getDay();
      
      // Déjà complété
      if (weekData.completed && weekData.completed.includes(dayIndex)) {
        return 'completed';
      }
      
      // Disponible uniquement aujourd'hui
      if (today === dayIndex) {
        return 'available';
      }
      
      // Passé (avant aujourd'hui) mais pas complété = perdu
      if (dayIndex < today && today <= 5) { // 5 = Vendredi
        return 'locked';
      }
      
      // Futur = verrouillé
      if (dayIndex > today) {
        return 'locked';
      }
      
      // Weekend = caché
      return 'locked';
    }

    // ============================================
    // METTRE À JOUR LA PROGRESSION
    // ============================================
    function updateWeekProgress() {
      const weekData = getWeekData();
      const earnings = weekData.earnings || 0;
      const progress = (earnings / MAX_WEEK_EARNINGS) * 100;
      
      document.getElementById('weekEarnings').textContent = earnings + ' FCFA';
      document.getElementById('weekProgress').textContent = `${earnings}/${MAX_WEEK_EARNINGS} FCFA`;
      document.getElementById('progressFill').style.width = progress + '%';
    }

    // ============================================
    // COMMENCER UNE ACTIVITÉ
    // ============================================
    function startActivity(dayIndex) {
      const today = new Date().getDay();
      
      if (dayIndex !== today) {
        showNotification('❌ Non disponible', 'Cette activité n\'est disponible que le jour même', 'error');
        return;
      }
      
      const weekData = getWeekData();
      
      if (weekData.completed && weekData.completed.includes(dayIndex)) {
        showNotification('⏰ Déjà fait', 'Vous avez déjà complété cette activité', 'warning');
        return;
      }
      
      if ((weekData.earnings || 0) + DAILY_MAX > MAX_WEEK_EARNINGS) {
        showNotification('⚠️ Limite atteinte', 'Vous avez atteint le maximum de la semaine', 'warning');
        return;
      }
      
      // Rediriger vers l'activité du jour
      const day = days[dayIndex - 1];
      window.location.href = day.link;
    }

    // ============================================
    // VALIDER UNE ACTIVITÉ (à appeler depuis les jeux)
    // ============================================
    function completeActivity(dayIndex, amount = DAILY_MAX) {
      const weekKey = getWeekKey();
      const weekData = getWeekData();
      
      if (!weekData.completed) weekData.completed = [];
      if (!weekData.earnings) weekData.earnings = 0;
      
      if (weekData.completed.includes(dayIndex)) return;
      if (weekData.earnings + amount > MAX_WEEK_EARNINGS) return;
      
      weekData.completed.push(dayIndex);
      weekData.earnings += amount;
      
      localStorage.setItem(`week_${weekKey}_${userId}`, JSON.stringify(weekData));
      
      // Ajouter au solde
      if (userData) {
        userData.balance += amount;
        userData.totalEarned += amount;
        localStorage.setItem(`earnzone_user_${userId}`, JSON.stringify(userData));
        document.getElementById('currentBalance').textContent = 
          (userData.balance || 0).toLocaleString('fr-FR') + ' FCFA';
      }
      
      updateWeekProgress();
      renderCalendar();
      
      showNotification('🎉 +' + amount + ' FCFA', 'Gagné !', 'success');
    }

    // ============================================
    // NOTIFICATION
    // ============================================
    function showNotification(title, message, type = 'success') {
      const notification = document.getElementById('notification');
      document.getElementById('notificationTitle').textContent = title;
      document.getElementById('notificationMessage').textContent = message;
      notification.classList.add('show');
      setTimeout(() => notification.classList.remove('show'), 3000);
    }

    // ============================================
    // DÉMARRER
    // ============================================
    document.addEventListener('DOMContentLoaded', init);
  </script>

</body>
</html>
