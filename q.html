<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone - Quiz Hebdomadaire</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    /* ===== VARIABLES GLOBALES ===== */
    :root {
      --primary: #00ffcc;
      --primary-dark: #00cca3;
      --secondary: #ff4d94;
      --accent: #9d4edd;
      --bg-dark: #000000;
      --bg-medium: #0a0a0a;
      --bg-light: #1a1a1a;
      --text-light: #ffffff;
      --text-dim: #94a3b8;
      --card-bg: rgba(20, 20, 20, 0.8);
      --card-border: rgba(255, 255, 255, 0.05);
      --success: #4cff4c;
      --warning: #ffcc00;
      --danger: #ff4757;
      --correct: #4cff4c;
      --incorrect: #ff4757;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000000;
      color: var(--text-light);
      padding-bottom: 100px;
      min-height: 100vh;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, rgba(255, 77, 148, 0.05) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(0, 255, 204, 0.05) 0%, transparent 40%);
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 5%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
    }

    .back-btn:hover {
      color: var(--primary);
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 600;
    }

    .page-title i {
      color: var(--primary);
    }

    .balance-display {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 255, 204, 0.05);
      border: 1px solid rgba(0, 255, 204, 0.1);
      border-radius: 30px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
    }

    /* ===== CONTENEUR ===== */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ===== EN-TÊTE DU QUIZ ===== */
    .quiz-header {
      background: linear-gradient(135deg, rgba(255, 77, 148, 0.1), rgba(0, 255, 204, 0.1));
      border-radius: 24px;
      padding: 25px;
      margin-bottom: 25px;
      text-align: center;
      border: 1px solid var(--card-border);
    }

    .quiz-header h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .quiz-header p {
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .week-badge {
      display: inline-block;
      background: rgba(255, 77, 148, 0.1);
      border: 1px solid rgba(255, 77, 148, 0.3);
      border-radius: 30px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--secondary);
      margin-bottom: 15px;
    }

    .stats-quiz {
      display: flex;
      justify-content: space-around;
      margin-top: 15px;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ===== PROGRESSION ===== */
    .progress-container {
      margin: 20px 0;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      width: 0%;
      transition: width 0.3s;
    }

    /* ===== CARTE QUESTION ===== */
    .question-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 25px;
      margin-bottom: 20px;
      transition: var(--transition);
    }

    .question-number {
      display: inline-block;
      background: rgba(255, 77, 148, 0.1);
      border: 1px solid rgba(255, 77, 148, 0.3);
      border-radius: 20px;
      padding: 5px 15px;
      font-size: 12px;
      font-weight: 600;
      color: var(--secondary);
      margin-bottom: 15px;
    }

    .question-text {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .reward-info {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 255, 204, 0.05);
      border: 1px solid rgba(0, 255, 204, 0.1);
      border-radius: 20px;
      padding: 8px 15px;
      margin-bottom: 20px;
      width: fit-content;
    }

    .reward-info i {
      color: var(--primary);
    }

    .reward-amount {
      color: var(--primary);
      font-weight: 600;
    }

    /* ===== OPTIONS DE RÉPONSE ===== */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin: 20px 0;
    }

    .option-btn {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 18px 20px;
      text-align: left;
      font-size: 16px;
      color: var(--text-light);
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .option-btn:hover:not(:disabled) {
      background: rgba(0, 255, 204, 0.05);
      border-color: var(--primary);
      transform: translateY(-2px);
    }

    .option-btn.selected {
      background: rgba(0, 255, 204, 0.1);
      border-color: var(--primary);
    }

    .option-btn.correct {
      background: rgba(76, 255, 76, 0.1);
      border-color: var(--correct);
    }

    .option-btn.incorrect {
      background: rgba(255, 71, 87, 0.1);
      border-color: var(--incorrect);
    }

    .option-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .option-prefix {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--primary);
    }

    .selected .option-prefix {
      background: var(--primary);
      color: black;
    }

    .correct .option-prefix {
      background: var(--correct);
      color: black;
    }

    .incorrect .option-prefix {
      background: var(--incorrect);
      color: white;
    }

    /* ===== BOUTONS ===== */
    .btn-primary {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: black;
      border: none;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 10px 0;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(0, 255, 204, 0.3);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-secondary {
      width: 100%;
      padding: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: var(--text-light);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin: 5px 0;
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: var(--primary);
      background: rgba(0, 255, 204, 0.05);
    }

    /* ===== RÉSULTATS ===== */
    .results-card {
      background: linear-gradient(135deg, rgba(0, 255, 204, 0.1), rgba(255, 77, 148, 0.1));
      border-radius: 24px;
      padding: 30px 20px;
      margin: 25px 0;
      text-align: center;
      border: 1px solid var(--card-border);
    }

    .results-icon {
      font-size: 64px;
      color: var(--primary);
      margin-bottom: 15px;
    }

    .results-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .results-score {
      font-size: 48px;
      font-weight: 800;
      color: var(--primary);
      margin: 15px 0;
    }

    .results-max {
      font-size: 16px;
      color: var(--text-dim);
    }

    .results-details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin: 25px 0;
    }

    .detail-item {
      background: rgba(0, 0, 0, 0.3);
      border-radius: 16px;
      padding: 15px;
      text-align: center;
    }

    .detail-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 5px;
    }

    .detail-value {
      font-size: 20px;
      font-weight: 700;
    }

    .correct-value {
      color: var(--correct);
    }

    .incorrect-value {
      color: var(--incorrect);
    }

    .results-message {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.6;
      margin: 20px 0;
    }

    /* ===== TABLEAU DES GAINS ===== */
    .gains-section {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 20px;
      margin: 20px 0;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 15px;
      color: var(--primary);
    }

    .gain-tier {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .gain-tier:last-child {
      border-bottom: none;
    }

    .gain-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gain-icon {
      width: 30px;
      height: 30px;
      background: rgba(0, 255, 204, 0.1);
      border: 1px solid rgba(0, 255, 204, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 14px;
    }

    .gain-text {
      font-size: 14px;
      font-weight: 500;
    }

    .gain-amount {
      font-size: 16px;
      font-weight: 700;
      color: var(--success);
    }

    .week-info {
      margin-top: 15px;
      padding: 12px;
      background: rgba(255, 77, 148, 0.05);
      border: 1px solid rgba(255, 77, 148, 0.1);
      border-radius: 12px;
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }

    .week-info i {
      color: var(--secondary);
      margin-right: 5px;
    }

    /* ===== NOTIFICATION ===== */
    .notification {
      position: fixed;
      bottom: 80px;
      left: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid var(--primary);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 1000;
      transform: translateY(200px);
      transition: transform 0.5s;
      max-width: 400px;
      margin: 0 auto;
    }

    .notification.show {
      transform: translateY(0);
    }

    .notification-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
    }

    .notification-content h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .notification-content p {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ===== BOUTON RETOUR ===== */
    .back-home {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: black;
      padding: 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0, 255, 204, 0.3);
      z-index: 99;
      max-width: 500px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div class="gradient-bg"></div>

  <div class="notification" id="notification">
    <div class="notification-icon">
      <i class="fas fa-gift"></i>
    </div>
    <div class="notification-content">
      <h4 id="notificationTitle">Quiz Hebdomadaire</h4>
      <p id="notificationMessage">Bonne chance !</p>
    </div>
  </div>

  <header class="header">
    <a href="calendrier.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Calendrier
    </a>
    <div class="page-title">
      <i class="fas fa-question-circle"></i> Quiz Hebdo
    </div>
    <div class="balance-display">
      <i class="fas fa-coins"></i>
      <span id="currentBalance">0 FCFA</span>
    </div>
  </header>

  <div class="container">
    
    <!-- En-tête du quiz -->
    <div class="quiz-header">
      <h1>QUIZ HEBDOMADAIRE</h1>
      <p>Nouvelles questions chaque semaine !</p>
      <div class="week-badge" id="weekBadge">
        <i class="fas fa-calendar-week"></i> <span id="weekNumber">Semaine 1</span>
      </div>
      
      <div class="stats-quiz">
        <div class="stat-item">
          <div class="stat-value" id="correctCount">0</div>
          <div class="stat-label">Bonnes</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="totalEarned">0</div>
          <div class="stat-label">Gagné</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="remainingQuestions">8</div>
          <div class="stat-label">Restantes</div>
        </div>
      </div>
    </div>

    <!-- Progression -->
    <div class="progress-container">
      <div class="progress-header">
        <span>Progression</span>
        <span id="progressText">0/8 questions</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Zone des questions -->
    <div id="quizContainer"></div>

    <!-- Bouton commencer (visible seulement si disponible) -->
    <button class="btn-primary" onclick="startQuiz()" id="startBtn">
      <i class="fas fa-play"></i> COMMENCER LE QUIZ
    </button>

    <!-- Tableau des gains -->
    <div class="gains-section">
      <h3 class="section-title">
        <i class="fas fa-trophy"></i>
        Gains
      </h3>

      <div class="gain-tier">
        <div class="gain-info">
          <div class="gain-icon">
            <i class="fas fa-check"></i>
          </div>
          <span class="gain-text">Par bonne réponse</span>
        </div>
        <span class="gain-amount">50 FCFA</span>
      </div>

      <div class="gain-tier">
        <div class="gain-info">
          <div class="gain-icon">
            <i class="fas fa-star"></i>
          </div>
          <span class="gain-text">Maximum (8/8)</span>
        </div>
        <span class="gain-amount">400 FCFA</span>
      </div>

      <div class="week-info">
        <i class="fas fa-info-circle"></i>
        <span id="weekStatus">Quiz disponible cette semaine</span>
      </div>
    </div>

  </div>

  <a href="calendrier.html" class="back-home">
    <i class="fas fa-home"></i> Retour au calendrier
  </a>

  <script>
    // ============================================
    // BASE DE DONNÉES DES QUESTIONS (20 semaines différentes)
    // ============================================
    const questionSets = {

        {

        {
          question: "En quelle année l'homme a marché sur la Lune ?",
          options: ["1969", "1972", "1965", "1975"],
          correct: 0
        },
        {
          question: "Qui a été le premier président des États-Unis ?",
          options: ["Thomas Jefferson", "Abraham Lincoln", "George Washington", "John Adams"],
          correct: 2
        },
        {
          question: "Quel empire a construit le Machu Picchu ?",
          options: ["Aztèque", "Maya", "Inca", "Olmèque"],
          correct: 2
        },
        {
          question: "En quelle année le mur de Berlin est tombé ?",
          options: ["1989", "1990", "1985", "1995"],
          correct: 0
        }
      ],
      5: [ // Semaine 5 - Sports
        {
          question: "Combien de joueurs compte une équipe de football ?",
          options: ["10", "11", "12", "9"],
          correct: 1
        },
        {
          question: "Quel pays a gagné la Coupe du Monde 2018 ?",
          options: ["Allemagne", "Brésil", "France", "Espagne"],
          correct: 2
        },
        {
          question: "Quel est le sport le plus pratiqué au monde ?",
          options: ["Football", "Basketball", "Tennis", "Natation"],
          correct: 0
        },
        {
          question: "Combien de points vaut un essai au rugby ?",
          options: ["3", "4", "5", "6"],
          correct: 2
        },
        {
          question: "Qui a remporté le plus de Ballons d'Or ?",
          options: ["Cristiano Ronaldo", "Lionel Messi", "Pelé", "Maradona"],
          correct: 1
        },
        {
          question: "Quelle est la distance d'un marathon ?",
          options: ["40 km", "42,195 km", "45 km", "41 km"],
          correct: 1
        },
        {
          question: "Combien de sets pour gagner au tennis ?",
          options: ["2", "3", "4", "5"],
          correct: 1
        },
        {
          question: "Quel pays a inventé le basketball ?",
          options: ["Canada", "États-Unis", "France", "Angleterre"],
          correct: 1
        }
      ]
    };

    // ============================================
    // VARIABLES
    // ============================================
    let userData = null;
    let userId = null;
    
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let answers = [];
    let quizActive = false;
    let quizFinished = false;
    let currentWeek = 1;
    
    const REWARD_PER_QUESTION = 50;
    const MAX_REWARD = 400;

    // ============================================
    // INITIALISATION
    // ============================================
    function init() {
      loadUserData();
      determineCurrentWeek();
      checkQuizStatus();
      updateWeekDisplay();
      renderStartScreen();
    }

    // ============================================
    // CHARGER DONNÉES UTILISATEUR
    // ============================================
    function loadUserData() {
      userId = localStorage.getItem('earnzone_current_user');
      
      if (!userId) {
        window.location.href = '../login.html';
        return;
      }
      
      const userDataStr = localStorage.getItem(`earnzone_user_${userId}`);
      if (userDataStr) {
        userData = JSON.parse(userDataStr);
        document.getElementById('currentBalance').textContent = 
          (userData.balance || 0).toLocaleString('fr-FR') + ' FCFA';
      }
    }

    // ============================================
    // DÉTERMINER LA SEMAINE EN COURS
    // ============================================
    function determineCurrentWeek() {
      const startDate = new Date('2024-01-01'); // Date de référence
      const today = new Date();
      const diffTime = Math.abs(today - startDate);
      const diffWeeks = Math.floor(diffTime / (1000 * 60 * 60 * 24 * 7));
      currentWeek = (diffWeeks % 5) + 1; // Alterne entre les 5 sets
    }

    // ============================================
    // VÉRIFIER LE STATUT DU QUIZ
    // ============================================
    function checkQuizStatus() {
      const today = new Date().getDay(); // 2 = Mardi
      const quizWeekKey = `quiz_week_${userId}`;
      const quizCompletedKey = `quiz_completed_${userId}`;
      
      const savedWeek = localStorage.getItem(quizWeekKey);
      const completed = localStorage.getItem(quizCompletedKey) === 'true';
      
      if (savedWeek != currentWeek) {
        // Nouvelle semaine, on réinitialise
        localStorage.setItem(quizWeekKey, currentWeek);
        localStorage.removeItem(quizCompletedKey);
        quizFinished = false;
        document.getElementById('startBtn').disabled = false;
      } else {
        // Même semaine, vérifier si déjà fait
        quizFinished = completed;
        if (quizFinished) {
          document.getElementById('startBtn').disabled = true;
          document.getElementById('startBtn').innerHTML = '<i class="fas fa-check-circle"></i> DÉJÀ COMPLÉTÉ';
        }
      }
      
      // Vérifier si c'est mardi
      if (today !== 2) {
        document.getElementById('startBtn').disabled = true;
        document.getElementById('startBtn').innerHTML = '<i class="fas fa-clock"></i> REVENEZ MARDI';
        document.getElementById('weekStatus').innerHTML = 'Quiz disponible uniquement le mardi';
      }
    }

    // ============================================
    // METTRE À JOUR L'AFFICHAGE DE LA SEMAINE
    // ============================================
    function updateWeekDisplay() {
      document.getElementById('weekNumber').textContent = `Semaine ${currentWeek}`;
      currentQuestions = questionSets[currentWeek];
    }

    // ============================================
    // AFFICHER L'ÉCRAN DE DÉMARRAGE
    // ============================================
    function renderStartScreen() {
      const container = document.getElementById('quizContainer');
      
      if (quizFinished) {
        container.innerHTML = `
          <div class="results-card">
            <div class="results-icon">
              <i class="fas fa-check-circle" style="color: var(--success);"></i>
            </div>
            <h2 class="results-title">QUIZ DÉJÀ COMPLÉTÉ</h2>
            <p class="results-message">
              Vous avez déjà fait le quiz de cette semaine.<br>
              Revenez mardi prochain pour de nouvelles questions !
            </p>
            <button class="btn-secondary" onclick="window.location.href='calendrier.html'">
              <i class="fas fa-calendar"></i> RETOUR AU CALENDRIER
            </button>
          </div>
        `;
      } else {
        container.innerHTML = `
          <div class="question-card" style="text-align: center;">
            <div style="font-size: 64px; color: var(--primary); margin-bottom: 20px;">
              <i class="fas fa-question-circle"></i>
            </div>
            <h2 style="margin-bottom: 15px;">Prêt pour le quiz ?</h2>
            <p style="color: var(--text-dim); margin-bottom: 20px;">
              8 questions • 50 FCFA par bonne réponse<br>
              Total maximum : 400 FCFA
            </p>
            <p style="color: var(--text-dim); font-size: 13px;">
              <i class="fas fa-info-circle"></i> Une seule chance par semaine !
            </p>
          </div>
        `;
      }
    }

    // ============================================
    // COMMENCER LE QUIZ
    // ============================================
    function startQuiz() {
      if (quizFinished) return;
      
      quizActive = true;
      currentQuestionIndex = 0;
      score = 0;
      answers = [];
      currentQuestions = questionSets[currentWeek];
      
      document.getElementById('startBtn').style.display = 'none';
      renderQuestion();
      updateStats();
    }

    // ============================================
    // AFFICHER UNE QUESTION
    // ============================================
    function renderQuestion() {
      const container = document.getElementById('quizContainer');
      const q = currentQuestions[currentQuestionIndex];
      
      let optionsHtml = '';
      q.options.forEach((option, index) => {
        optionsHtml += `
          <div class="option-btn" onclick="selectAnswer(${index})" id="option-${index}">
            <span class="option-prefix">${String.fromCharCode(65 + index)}</span>
            ${option}
          </div>
        `;
      });
      
      container.innerHTML = `
        <div class="question-card">
          <div class="question-number">Question ${currentQuestionIndex + 1}/8</div>
          <div class="question-text">${q.question}</div>
          
          <div class="reward-info">
            <i class="fas fa-coins"></i>
            <span class="reward-amount">+50 FCFA</span>
          </div>
          
          <div class="options-grid" id="optionsContainer">
            ${optionsHtml}
          </div>
          
          <button class="btn-primary" onclick="nextQuestion()" id="nextBtn" disabled>
            QUESTION SUIVANTE
          </button>
        </div>
      `;
    }

    // ============================================
    // SÉLECTIONNER UNE RÉPONSE
    // ============================================
    function selectAnswer(index) {
      if (!quizActive) return;
      if (answers[currentQuestionIndex] !== undefined) return;
      
      const q = currentQuestions[currentQuestionIndex];
      const isCorrect = (index === q.correct);
      
      // Mettre à jour l'affichage des options
      for (let i = 0; i < 4; i++) {
        const option = document.getElementById(`option-${i}`);
        option.classList.remove('selected');
        
        if (i === index) {
          option.classList.add('selected');
        }
      }
      
      // Sauvegarder la réponse
      answers[currentQuestionIndex] = {
        selected: index,
        isCorrect: isCorrect
      };
      
      if (isCorrect) {
        score += REWARD_PER_QUESTION;
        showNotification('✅ Bonne réponse !', `+50 FCFA`, 'success');
      } else {
        showNotification('❌ Mauvaise réponse', 'La bonne réponse était ' + String.fromCharCode(65 + q.correct), 'error');
      }
      
      updateStats();
      document.getElementById('nextBtn').disabled = false;
    }

    // ============================================
    // QUESTION SUIVANTE
    // ============================================
    function nextQuestion() {
      if (currentQuestionIndex < currentQuestions.length - 1) {
        currentQuestionIndex++;
        renderQuestion();
        document.getElementById('nextBtn').disabled = true;
      } else {
        finishQuiz();
      }
    }

    // ============================================
    // TERMINER LE QUIZ
    // ============================================
    function finishQuiz() {
      quizActive = false;
      quizFinished = true;
      
      const correctAnswers = answers.filter(a => a?.isCorrect).length || 0;
      const totalGain = correctAnswers * REWARD_PER_QUESTION;
      
      // Marquer comme complété
      localStorage.setItem(`quiz_week_${userId}`, currentWeek);
      localStorage.setItem(`quiz_completed_${userId}`, 'true');
      
      // Ajouter les gains
      if (totalGain > 0) {
        userData.balance += totalGain;
        userData.totalEarned += totalGain;
        localStorage.setItem(`earnzone_user_${userId}`, JSON.stringify(userData));
        document.getElementById('currentBalance').textContent = 
          (userData.balance || 0).toLocaleString('fr-FR') + ' FCFA';
        
        // Marquer dans le calendrier
        if (window.opener && window.opener.completeActivity) {
          window.opener.completeActivity(2, totalGain);
        }
      }
      
      // Afficher les résultats
      renderResults(correctAnswers, totalGain);
    }

    // ============================================
    // AFFICHER LES RÉSULTATS
    // ============================================
    function renderResults(correct, gain) {
      const incorrect = 8 - correct;
      
      const container = document.getElementById('quizContainer');
      container.innerHTML = `
        <div class="results-card">
          <div class="results-icon">
            <i class="fas ${gain === 400 ? 'fa-crown' : 'fa-star'}"></i>
          </div>
          <h2 class="results-title">${gain === 400 ? 'FÉLICITATIONS !' : 'QUIZ TERMINÉ'}</h2>
          
          <div class="results-score">${gain} FCFA</div>
          <div class="results-max">sur 400 FCFA maximum</div>
          
          <div class="results-details">
            <div class="detail-item">
              <div class="detail-label">Bonnes réponses</div>
              <div class="detail-value correct-value">${correct}/8</div>
            </div>
            <div class="detail-item">
              <div class="detail-label">Mauvaises réponses</div>
              <div class="detail-value incorrect-value">${incorrect}/8</div>
            </div>
          </div>
          
          <div class="results-message">
            Quiz terminé ! Revenez mardi prochain pour de nouvelles questions.
          </div>
          
          <button class="btn-secondary" onclick="window.location.href='calendrier.html'">
            <i class="fas fa-calendar"></i> RETOUR AU CALENDRIER
          </button>
        </div>
      `;
      
      document.getElementById('startBtn').style.display = 'none';
    }

    // ============================================
    // METTRE À JOUR LES STATISTIQUES
    // ============================================
    function updateStats() {
      const correct = answers.filter(a => a?.isCorrect).length || 0;
      const remaining = 8 - (answers.length || 0);
      const progress = (answers.length / 8) * 100;
      
      document.getElementById('correctCount').textContent = correct;
      document.getElementById('totalEarned').textContent = (correct * REWARD_PER_QUESTION) + ' FCFA';
      document.getElementById('remainingQuestions').textContent = remaining;
      document.getElementById('progressText').textContent = `${answers.length}/8 questions`;
      document.getElementById('progressFill').style.width = progress + '%';
    }

    // ============================================
    // NOTIFICATION
    // ============================================
    function showNotification(title, message, type = 'success') {
      const notification = document.getElementById('notification');
      document.getElementById('notificationTitle').textContent = title;
      document.getElementById('notificationMessage').textContent = message;
      notification.classList.add('show');
      setTimeout(() => notification.classList.remove('show'), 3000);
    }

    // ============================================
    // DÉMARRER
    // ============================================
    init();
  </script>

</body>
