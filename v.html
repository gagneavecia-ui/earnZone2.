<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>EarnZone - Vidéos du Mercredi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  
  <style>
    /* ===== VARIABLES GLOBALES ===== */
    :root {
      --primary: #00ffcc;
      --primary-dark: #00cca3;
      --secondary: #ff4d94;
      --accent: #9d4edd;
      --bg-dark: #000000;
      --bg-medium: #0a0a0a;
      --bg-light: #1a1a1a;
      --text-light: #ffffff;
      --text-dim: #94a3b8;
      --card-bg: rgba(20, 20, 20, 0.8);
      --card-border: rgba(255, 255, 255, 0.05);
      --success: #4cff4c;
      --warning: #ffcc00;
      --danger: #ff4757;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
      --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #000000;
      color: var(--text-light);
      padding-bottom: 100px;
      min-height: 100vh;
    }

    .gradient-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      background: radial-gradient(circle at 20% 30%, rgba(0, 255, 204, 0.05) 0%, transparent 40%),
                  radial-gradient(circle at 80% 70%, rgba(157, 78, 221, 0.05) 0%, transparent 40%);
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 5%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 14px;
    }

    .back-btn:hover {
      color: var(--primary);
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 600;
    }

    .page-title i {
      color: var(--primary);
    }

    .balance-display {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 255, 204, 0.05);
      border: 1px solid rgba(0, 255, 204, 0.1);
      border-radius: 30px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
    }

    /* ===== CONTENEUR ===== */
    .container {
      max-width: 500px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ===== EN-TÊTE ===== */
    .videos-header {
      background: linear-gradient(135deg, rgba(0, 255, 204, 0.1), rgba(157, 78, 221, 0.1));
      border-radius: 24px;
      padding: 25px;
      margin-bottom: 25px;
      text-align: center;
      border: 1px solid var(--card-border);
    }

    .videos-header h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .videos-header p {
      color: var(--text-dim);
      margin-bottom: 20px;
    }

    .week-badge {
      display: inline-block;
      background: rgba(0, 255, 204, 0.1);
      border: 1px solid rgba(0, 255, 204, 0.3);
      border-radius: 30px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 15px;
    }

    /* ===== PROGRESSION ===== */
    .progress-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .progress-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--primary);
    }

    .progress-stats {
      font-size: 14px;
      color: var(--text-dim);
    }

    .progress-bar {
      height: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      width: 0%;
      transition: width 0.5s;
    }

    .progress-earnings {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-dim);
    }

    .earned-amount {
      color: var(--primary);
      font-weight: 600;
    }

    /* ===== LISTE DES VIDÉOS ===== */
    .videos-grid {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 25px;
    }

    .video-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      overflow: hidden;
      transition: var(--transition);
      cursor: pointer;
    }

    .video-card:hover {
      border-color: var(--primary);
      transform: translateY(-5px);
    }

    .video-card.watched {
      opacity: 0.7;
      border-color: var(--success);
    }

    .video-card.watched:hover {
      transform: none;
    }

    .video-thumbnail {
      position: relative;
      width: 100%;
      height: 180px;
      background: #1a1a1a;
      overflow: hidden;
    }

    .thumbnail-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .video-card:hover .thumbnail-img {
      transform: scale(1.05);
    }

    .play-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .video-card:hover .play-overlay {
      opacity: 1;
    }

    .play-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: black;
    }

    .duration-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.8);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      color: white;
    }

    .watched-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--success);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      color: black;
      font-weight: 600;
      z-index: 2;
    }

    .video-info {
      padding: 15px;
    }

    .video-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .video-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .video-duration {
      font-size: 13px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .video-reward {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
    }

    /* ===== PLAYER INTÉGRÉ DANS LA CARTE ===== */
    .video-player-container {
      width: 100%;
      background: #000;
      position: relative;
    }

    .video-player {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .player-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      padding: 15px;
      display: flex;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .video-player-container:hover .player-controls {
      opacity: 1;
    }

    .validate-btn {
      padding: 8px 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: black;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
    }

    .validate-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 255, 204, 0.3);
    }

    .validate-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ===== NOTIFICATION ===== */
    .notification {
      position: fixed;
      bottom: 80px;
      left: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid var(--primary);
      border-radius: 16px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 1000;
      transform: translateY(200px);
      transition: transform 0.5s;
      max-width: 400px;
      margin: 0 auto;
    }

    .notification.show {
      transform: translateY(0);
    }

    .notification-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: black;
    }

    .notification-content h4 {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .notification-content p {
      font-size: 12px;
      color: var(--text-dim);
    }

    /* ===== BOUTON RETOUR ===== */
    .back-home {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: black;
      padding: 16px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      text-align: center;
      box-shadow: 0 5px 20px rgba(0, 255, 204, 0.3);
      z-index: 99;
      max-width: 500px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div class="gradient-bg"></div>

  <div class="notification" id="notification">
    <div class="notification-icon">
      <i class="fas fa-gift"></i>
    </div>
    <div class="notification-content">
      <h4 id="notificationTitle">Vidéos Publicitaires</h4>
      <p id="notificationMessage">Regardez et gagnez !</p>
    </div>
  </div>

  <header class="header">
    <a href="calendrier.html" class="back-btn">
      <i class="fas fa-arrow-left"></i> Calendrier
    </a>
    <div class="page-title">
      <i class="fas fa-play-circle"></i> Vidéos Pub
    </div>
    <div class="balance-display">
      <i class="fas fa-coins"></i>
      <span id="currentBalance">0 FCFA</span>
    </div>
  </header>

  <div class="container">
    
    <!-- En-tête -->
    <div class="videos-header">
      <h1>PUBLICITÉS DU MERCREDI</h1>
      <p>5 vidéos • 80 FCFA chacune • 400 FCFA maximum</p>
      <div class="week-badge" id="weekBadge">
        <i class="fas fa-calendar-week"></i> <span id="weekNumber">Semaine 1</span>
      </div>
    </div>

    <!-- Progression -->
    <div class="progress-card">
      <div class="progress-header">
        <span class="progress-title">Progression hebdomadaire</span>
        <span class="progress-stats" id="progressStats">0/5 vidéos</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-earnings">
        <span>Gagné aujourd'hui</span>
        <span class="earned-amount" id="earnedToday">0 FCFA / 400 FCFA</span>
      </div>
    </div>

    <!-- Liste des vidéos -->
    <div class="videos-grid" id="videosGrid">
      <!-- Les vidéos seront chargées ici -->
    </div>

  </div>

  <a href="calendrier.html" class="back-home">
    <i class="fas fa-home"></i> Retour au calendrier
  </a>

  <script>
    // ============================================
    // VIDÉOS PUBLICITAIRES COURTES (MP4 légers)
    // ============================================
    const videoSets = {
      1: [ // Semaine 1
        {
          id: 1,
          title: "Publicité - Nouveau Smartphone",
          duration: "0:15",
          seconds: 15,
          thumbnail: "https://images.pexels.com/photos/47261/pexels-photo-47261.jpeg?auto=compress&cs=tinysrgb&w=400",
          videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4",
          reward: 80
        },
        {
          id: 2,
          title: "Publicité - Application de Livraison",
          duration: "0:20",
          seconds: 20,
          thumbnail: "https://images.pexels.com/photos/4391470/pexels-photo-4391470.jpeg?auto=compress&cs=tinysrgb&w=400",
          videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4",
          reward: 80
        },
        {
          id: 3,
          title: "Publicité - Service de Streaming",
          duration: "0:18",
          seconds: 18,
          thumbnail: "https://images.pexels.com/photos/3945317/pexels-photo-3945317.jpeg?auto=compress&cs=tinysrgb&w=400",
          videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4",
          reward: 80
        },
        {
          id: 4,
          title: "Publicité - Boisson Énergisante",
          duration: "0:22",
          seconds: 22,
          thumbnail: "https://images.pexels.com/photos/1268101/pexels-photo-1268101.jpeg?auto=compress&cs=tinysrgb&w=400",
          videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
          reward: 80
        },
        {
          id: 5,
          title: "Publicité - Site de Voyages",
          duration: "0:25",
          seconds: 25,
          thumbnail: "https://images.pexels.com/photos/386025/pexels-photo-386025.jpeg?auto=compress&cs=tinysrgb&w=400",
          videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4",
          reward: 80
        }
      ],
      2: [ // Semaine 2
        {
          id: 6,
          title: "Publicité - Voiture Électrique",
          duration: "0:19",
          seconds: 19,
          thumbnail: "https://images.pexels.com/photos/116675/pexels-photo-116675.jpeg?auto=compress&cs=tinysrgb&w=400",
          videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4",
          reward: 80
        },
        {
          id: 7,
          title: "Publicité - Jeu Mobile",
          duration: "0:16",
          seconds: 16,
          thumbnail: "https://images.pexels.com/photos/3165335/pexels-photo-3165335.jpeg?auto=compress&cs=tinysrgb&w=400",
          videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4",
          reward: 80
        },
        {
          id: 8,
          title: "Publicité - Parfum",
          duration: "0:21",
          seconds: 21,
          thumbnail: "https://images.pexels.com/photos/965989/pexels-photo-965989.jpeg?auto=compress&cs=tinysrgb&w=400",
          videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4",
          reward: 80
        },
        {
          id: 9,
          title: "Publicité - Montre Connectée",
          duration: "0:23",
          seconds: 23,
          thumbnail: "https://images.pexels.com/photos/437037/pexels-photo-437037.jpeg?auto=compress&cs=tinysrgb&w=400",
          videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4",
          reward: 80
        },
        {
          id: 10,
          title: "Publicité - Service Bancaire",
          duration: "0:17",
          seconds: 17,
          thumbnail: "https://images.pexels.com/photos/259200/pexels-photo-259200.jpeg?auto=compress&cs=tinysrgb&w=400",
          videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscapes.mp4",
          reward: 80
        }
      ]
    };

    // ============================================
    // VARIABLES
    // ============================================
    let userData = null;
    let userId = null;
    
    let currentVideos = [];
    let watchedVideos = [];
    let currentlyPlaying = null;
    let videoTimer = null;
    let currentWeek = 1;
    
    const REWARD_PER_VIDEO = 80;
    const MAX_REWARD = 400;

    // ============================================
    // INITIALISATION
    // ============================================
    function init() {
      loadUserData();
      determineCurrentWeek();
      checkWednesdayStatus();
      loadVideos();
      updateWeekDisplay();
    }

    // ============================================
    // CHARGER DONNÉES UTILISATEUR
    // ============================================
    function loadUserData() {
      userId = localStorage.getItem('earnzone_current_user');
      
      if (!userId) {
        window.location.href = '../login.html';
        return;
      }
      
      const userDataStr = localStorage.getItem(`earnzone_user_${userId}`);
      if (userDataStr) {
        userData = JSON.parse(userDataStr);
        document.getElementById('currentBalance').textContent = 
          (userData.balance || 0).toLocaleString('fr-FR') + ' FCFA';
      }
    }

    // ============================================
    // DÉTERMINER LA SEMAINE
    // ============================================
    function determineCurrentWeek() {
      const startDate = new Date('2024-01-01');
      const today = new Date();
      const diffTime = Math.abs(today - startDate);
      const diffWeeks = Math.floor(diffTime / (1000 * 60 * 60 * 24 * 7));
      currentWeek = (diffWeeks % 2) + 1;
    }

    // ============================================
    // VÉRIFIER LE JOUR
    // ============================================
    function checkWednesdayStatus() {
      const today = new Date().getDay();
      const videosWeekKey = `videos_week_${userId}`;
      const watchedKey = `videos_watched_${userId}`;
      
      const savedWeek = localStorage.getItem(videosWeekKey);
      const savedWatched = localStorage.getItem(watchedKey);
      
      if (savedWeek != currentWeek) {
        localStorage.setItem(videosWeekKey, currentWeek);
        localStorage.setItem(watchedKey, JSON.stringify([]));
        watchedVideos = [];
      } else {
        watchedVideos = savedWatched ? JSON.parse(savedWatched) : [];
      }
    }

    // ============================================
    // CHARGER LES VIDÉOS
    // ============================================
    function loadVideos() {
      currentVideos = videoSets[currentWeek];
      renderVideos();
      updateProgress();
    }

        // ============================================
    // AFFICHER LES VIDÉOS
    // ============================================
    function renderVideos() {
      const container = document.getElementById('videosGrid');
      let html = '';
      
      currentVideos.forEach(video => {
        const isWatched = watchedVideos.includes(video.id);
        const isPlaying = currentlyPlaying === video.id;
        
        if (isPlaying) {
          // Afficher le lecteur vidéo
          html += `
            <div class="video-card" data-id="${video.id}">
              <div class="video-player-container">
                <video class="video-player" id="player-${video.id}" controls autoplay>
                  <source src="${video.videoUrl}" type="video/mp4">
                  Votre navigateur ne supporte pas les vidéos.
                </video>
                <div class="player-controls">
                  <button class="validate-btn" id="validate-${video.id}" onclick="validateVideo(${video.id})" disabled>
                    VALIDER (+80 FCFA)
                  </button>
                </div>
              </div>
              <div class="video-info">
                <div class="video-title">${video.title}</div>
                <div class="video-meta">
                  <span class="video-duration">
                    <i class="far fa-clock"></i> ${video.duration}
                  </span>
                  <span class="video-reward">+${video.reward} FCFA</span>
                </div>
              </div>
            </div>
          `;
        } else {
          // Afficher la miniature
          html += `
            <div class="video-card ${isWatched ? 'watched' : ''}" data-id="${video.id}" onclick="${!isWatched ? `playVideo(${video.id})` : ''}">
              <div class="video-thumbnail">
                <img src="${video.thumbnail}" alt="${video.title}" class="thumbnail-img" loading="lazy">
                ${isWatched ? '<div class="watched-badge"><i class="fas fa-check"></i> VU</div>' : ''}
                <div class="play-overlay">
                  <div class="play-icon">
                    <i class="fas fa-play"></i>
                  </div>
                </div>
                <div class="duration-badge">
                  <i class="far fa-clock"></i> ${video.duration}
                </div>
              </div>
              <div class="video-info">
                <div class="video-title">${video.title}</div>
                <div class="video-meta">
                  <span class="video-duration">
                    <i class="far fa-clock"></i> ${video.duration}
                  </span>
                  <span class="video-reward">+${video.reward} FCFA</span>
                </div>
              </div>
            </div>
          `;
        }
      });
      
      container.innerHTML = html;
      
      // Configurer les événements pour les vidéos en cours
      if (currentlyPlaying) {
        const video = document.getElementById(`player-${currentlyPlaying}`);
        if (video) {
          video.addEventListener('timeupdate', function() {
            const progress = (video.currentTime / video.duration) * 100;
            if (video.currentTime / video.duration > 0.95) {
              document.getElementById(`validate-${currentlyPlaying}`).disabled = false;
            }
          });
          
          video.addEventListener('ended', function() {
            validateVideo(currentlyPlaying);
          });
        }
      }
    }

    // ============================================
    // JOUER UNE VIDÉO
    // ============================================
    function playVideo(videoId) {
      const video = currentVideos.find(v => v.id === videoId);
      if (!video || watchedVideos.includes(video.id)) return;
      if (watchedVideos.length >= 5) return;
      
      currentlyPlaying = videoId;
      renderVideos();
    }

    // ============================================
    // VALIDER LA VIDÉO
    // ============================================
    function validateVideo(videoId) {
      const video = currentVideos.find(v => v.id === videoId);
      if (!video || watchedVideos.includes(video.id)) return;
      
      watchedVideos.push(video.id);
      localStorage.setItem(`videos_watched_${userId}`, JSON.stringify(watchedVideos));
      
      userData.balance += REWARD_PER_VIDEO;
      userData.totalEarned += REWARD_PER_VIDEO;
      localStorage.setItem(`earnzone_user_${userId}`, JSON.stringify(userData));
      
      document.getElementById('currentBalance').textContent = 
        (userData.balance || 0).toLocaleString('fr-FR') + ' FCFA';
      
      currentlyPlaying = null;
      
      renderVideos();
      updateProgress();
      
      if (window.opener && window.opener.completeActivity) {
        window.opener.completeActivity(3, REWARD_PER_VIDEO);
      }
      
      showNotification('🎉 +80 FCFA !', 'Publicité regardée avec succès', 'success');
      
      if (watchedVideos.length >= 5) {
        showNotification('🏆 FÉLICITATIONS !', 'Vous avez gagné 400 FCFA cette semaine', 'success');
      }
    }

    // ============================================
    // METTRE À JOUR LA PROGRESSION
    // ============================================
    function updateProgress() {
      const count = watchedVideos.length;
      const progress = (count / 5) * 100;
      const earned = count * REWARD_PER_VIDEO;
      
      document.getElementById('progressStats').textContent = `${count}/5 vidéos`;
      document.getElementById('progressFill').style.width = progress + '%';
      document.getElementById('earnedToday').textContent = `${earned} FCFA / ${MAX_REWARD} FCFA`;
    }

    // ============================================
    // METTRE À JOUR LA SEMAINE
    // ============================================
    function updateWeekDisplay() {
      document.getElementById('weekNumber').textContent = `Semaine ${currentWeek}`;
    }

    // ============================================
    // NOTIFICATION
    // ============================================
    function showNotification(title, message, type = 'success') {
      const notification = document.getElementById('notification');
      document.getElementById('notificationTitle').textContent = title;
      document.getElementById('notificationMessage').textContent = message;
      notification.classList.add('show');
      setTimeout(() => notification.classList.remove('show'), 3000);
    }

    // ============================================
    // DÉMARRER
    // ============================================
    init();
  </script>

</body>
</html>
